name: plugin-mobile-check

# Plugin mobile check.
#
# Validates the React Native plugin surface:
#   - Renderer helper unit tests + style registry parity, both via
#     `node --test` (`npm test`): `__tests__/unit/*` covers the CMS field
#     readers, `useInterpolatedField`, `buildSectionClasses`, and the
#     css_mobile classifier (Slice 9); `__tests__/registry-parity.test.mjs`
#     checks every core style published by `@selfhelp/shared` has a mobile
#     impl.
#   - TypeScript compiles (catches missing plugin impl signatures).
#   - `scripts/plugins-sync.mjs --dry-run` is reproducible: running it
#     against the configured backend must not produce any uncommitted
#     change in `selfhelp.plugins.lock.json` or
#     `components/styles/registered.ts`.
#   - Web export (`expo export -p web`) succeeds. This is a stand-in for
#     native bundle reachability that a CI runner can actually finish in
#     a reasonable amount of time without an EAS subscription.
#
# Native EAS builds remain on EAS Cloud; this workflow only verifies the
# JS bundle compiles + the plugin sync stays deterministic.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # GitHub derives the branch-protection required-check name from the job's
  # `name:` (falling back to the job id). Both are pinned to `mobile-parity`
  # so the required check documented in
  # sh-selfhelp_backend/docs/developer/15-testing-guidelines.md →
  # "Branch protection" literally exists in GitHub Actions. Keep `name:` and
  # the job id identical and stable; do not replace `name:` with prose, or the
  # required check silently renames. (This job runs: style-registry parity,
  # type-check, plugins:sync dry-run, and the Expo web export.)
  mobile-parity:
    name: mobile-parity
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout mobile
        uses: actions/checkout@v4
        with:
          path: sh-selfhelp_mobile

      # Same-branch-or-main: coordinated cross-repo work happens on equally
      # named feature branches; check the shared sibling out at the branch
      # matching this build's branch name when it exists, else at main. See
      # sh-selfhelp_backend/docs/developer/branch-merge-order.md.
      - name: Resolve shared ref (same branch as this build, else main)
        id: shared-ref
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          REF="main"
          if [ -n "$BRANCH" ] && [ "$BRANCH" != "main" ] && \
             git ls-remote --exit-code --heads \
               "https://x-access-token:${GH_TOKEN}@github.com/humdek-unibe-ch/sh-selfhelp_shared.git" \
               "refs/heads/${BRANCH}" > /dev/null 2>&1; then
            REF="$BRANCH"
          fi
          echo "ref=${REF}" >> "$GITHUB_OUTPUT"
          echo "Resolved sh-selfhelp_shared ref: ${REF} (build branch: ${BRANCH})"

      - name: Checkout shared (sibling)
        uses: actions/checkout@v4
        with:
          repository: humdek-unibe-ch/sh-selfhelp_shared
          ref: ${{ steps.shared-ref.outputs.ref }}
          path: sh-selfhelp_shared

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: sh-selfhelp_mobile/package-lock.json

      - name: Install dependencies
        working-directory: sh-selfhelp_mobile
        run: npm ci --legacy-peer-deps

      - name: License headers
        working-directory: sh-selfhelp_mobile
        run: npm run headers:check

      # Blocking lint gate (zero warnings). The strict, type-aware Expo flat
      # config in eslint.config.js is only meaningful if CI enforces it;
      # --max-warnings=0 keeps the run deterministic.
      - name: Lint
        working-directory: sh-selfhelp_mobile
        run: npm run lint -- --max-warnings=0

      - name: Type-check
        working-directory: sh-selfhelp_mobile
        run: npm run typecheck

      - name: Renderer helper + registry parity tests (node --test)
        working-directory: sh-selfhelp_mobile
        run: npm test

      - name: Plugins sync dry-run
        working-directory: sh-selfhelp_mobile
        env:
          SELFHELP_BACKEND_URL: ${{ vars.SELFHELP_BACKEND_URL }}
          SELFHELP_API_TOKEN: ${{ secrets.SELFHELP_API_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${SELFHELP_BACKEND_URL:-}" ]; then
            echo "SELFHELP_BACKEND_URL not set; skipping plugins:sync dry-run."
            exit 0
          fi
          npm run plugins:sync -- --backend "$SELFHELP_BACKEND_URL" --dry-run
          if [ -n "$(git status --porcelain selfhelp.plugins.lock.json package.json components/styles/registered.ts 2>/dev/null)" ]; then
            echo "::error::plugins:sync produced uncommitted changes."
            git status --porcelain
            exit 1
          fi

      - name: Expo web export
        working-directory: sh-selfhelp_mobile
        env:
          EXPO_NO_TELEMETRY: '1'
          EXPO_PUBLIC_API_URL: 'https://example.invalid'
        run: npm run web:build
        continue-on-error: true
        # Allowed to soft-fail because Expo's web export needs a valid
        # config bundle and EAS profile selection that the CI runner
        # does not own. The earlier steps are the binding gates.
